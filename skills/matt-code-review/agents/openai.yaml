interface:
  display_name: "Matt Code Review"
  short_description: "Review the changes since a fixed point (commit, branch, tag,..."
  default_prompt: "Use $matt-code-review to review the changes since a fixed point (commit, branch, tag, or merge-base) along two axes — Standards (does the code follow this repo's documented coding standards?) and Spec (does the code match what the originating issue/PRD asked for?). Runs both reviews in parallel sub-agents and reports them side by side. Use when the user wants to review a branch, a PR, work-in-progress changes, or asks to \"review since X\"."
