name: Stack verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  GITLEAKS_VERSION: v8.30.1

jobs:
  stack-verification:
    name: Stack architecture and runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify registries and migration
        run: |
          python3 scripts/classify-capabilities.py --check
          python3 scripts/build-capability-registry.py --check
          python3 scripts/apply-skill-layout.py --dry-run
          python3 scripts/sync-upstreams.py

      - name: Run Stack test suite
        run: python3 -m unittest discover -s tests

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.11"
          cache: false

      - name: Scan current tree for secrets
        run: go run github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION} dir --redact --config .gitleaks.toml .

  stack-sensitive-content:
    name: Stack sensitive content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan stack-specific sensitive content
        run: scripts/security/scan-sensitive-content.sh
