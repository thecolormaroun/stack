interface:
  display_name: "David Google Safe Browsing"
  short_description: "Prevent and fix Google Safe Browsing \"Dangerous site\" flags...."
  default_prompt: "Use $david-google-safe-browsing to prevent and fix Google Safe Browsing \"Dangerous site\" flags. Use when launching a public web app, buying/picking a domain, building a login or signup page, or when any site shows a red \"Dangerous site\" / \"Deceptive site\" warning in Chrome, Brave, Safari, Firefox, or Edge. Triggers on \"dangerous site\", \"deceptive site\", \"site blocked\", \"safe browsing\", \"phishing flag\", \"red warning screen\"."
